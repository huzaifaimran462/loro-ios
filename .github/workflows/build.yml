name: Build Loro for iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout loro-py
        uses: actions/checkout@v4
        with:
          repository: loro-dev/loro-py
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release --target aarch64-apple-ios --out dist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: loro-ios-wheel
          path: dist/*.whl
