name: Build Loro for iOS

on:
  workflow_dispatch:

env:
  # Silences the Node.js warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install maturin
        run: pip install maturin

      - name: Download, Extract, and Compile Loro
        run: |
          # 1. Download the source directly from Python's official registry
          pip download loro==1.10.3 --no-binary :all:
          
          # 2. Unzip the source code tarball
          tar -xzf loro-1.10.3.tar.gz
          
          # 3. Enter the folder and attempt the cross-compile
          cd loro-1.10.3
          maturin build --release --target aarch64-apple-ios --out ../dist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: loro-ios-wheel
          path: dist/*.whl
