name: Build Loro for iOS (after beeware attempt but rem now)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Bypass PyO3 cross-compile validations
  PYO3_CROSS_PYTHON_VERSION: "3.13"
  PYO3_CROSS_LIB_DIR: "/tmp"
  # Force the linker to ignore missing iOS Python C-libraries
  RUSTFLAGS: "-C link-arg=-undefined -C link-arg=dynamic_lookup"

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install maturin
        run: pip install maturin

      - name: Create Python Interceptor
        run: |
          # 1. Create a python script that intercepts JSON responses
          cat << 'EOF' > fake_python.py
          import sys
          import subprocess
          result = subprocess.run([sys.executable] + sys.argv[1:], capture_output=True, text=True)
          out = result.stdout
          
          # The Man-in-the-Middle rewrite: Tell Maturin we are natively on iOS
          out = out.replace('"system": "Darwin"', '"system": "Ios"')
          out = out.replace('"system": "darwin"', '"system": "Ios"')
          out = out.replace('"platform": "darwin"', '"platform": "ios"')
          
          sys.stdout.write(out)
          sys.stderr.write(result.stderr)
          sys.exit(result.returncode)
          EOF
          
          # 2. Create the executable bash wrapper
          cat << EOF > fake_python
          #!/bin/bash
          python3 ${GITHUB_WORKSPACE}/fake_python.py "\$@"
          EOF
          chmod +x fake_python

      - name: Download and Extract
        run: |
          pip download loro==1.10.3 --no-binary :all:
          tar -xzf loro-1.10.3.tar.gz

      - name: Compile Loro Wheel
        run: |
          cd loro-1.10.3
          # We pass -i to forcefully inject our Fake Python into the compiler pipeline
          maturin build --release --target aarch64-apple-ios --out ../dist -i ${GITHUB_WORKSPACE}/fake_python

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: loro-ios-wheel
          path: dist/*.whl
