name: Build Loro for iOS

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # --- THE FIX ---
  # These variables force the Rust compiler to bypass the missing iOS Python files
  PYO3_CROSS_PYTHON_VERSION: "3.13"
  PYO3_CROSS_LIB_DIR: "/tmp" 
  RUSTFLAGS: "-C link-arg=-undefined -C link-arg=dynamic_lookup"

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install maturin
        run: pip install maturin

      - name: Download and Extract
        run: |
          # Grabbing the code directly from Python's official registry to bypass the Git error
          pip download loro==1.10.3 --no-binary :all:
          tar -xzf loro-1.10.3.tar.gz

      - name: Compile with Custom iOS Flags
        run: |
          cd loro-1.10.3
          maturin build --release --target aarch64-apple-ios --out ../dist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: loro-ios-wheel
          path: dist/*.whl
