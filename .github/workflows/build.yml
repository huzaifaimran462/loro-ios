name: Build Loro for iOS

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYO3_CROSS_PYTHON_VERSION: "3.13"
  PYO3_CROSS_LIB_DIR: "/tmp"
  RUSTFLAGS: "-C link-arg=-undefined -C link-arg=dynamic_lookup"

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install maturin
        run: pip install maturin

      - name: Create Python Interceptor
        run: |
          cat << 'EOF' > fake_python.py
          import sys
          import subprocess
          import re
          
          result = subprocess.run([sys.executable] + sys.argv[1:], capture_output=True, text=True)
          out = result.stdout
          
          # 1. Fix the OS mismatch (maturin expects strictly lowercase 'ios')
          out = out.replace('"system": "Darwin"', '"system": "ios"')
          out = out.replace('"system": "darwin"', '"system": "ios"')
          out = out.replace('"system": "Ios"', '"system": "ios"')
          
          # 2. Fix the Architecture mismatch (macOS uses "arm64", but maturin expects "aarch64" for iOS)
          out = out.replace('"machine": "arm64"', '"machine": "aarch64"')
          out = out.replace('"machine": "x86_64"', '"machine": "aarch64"')
          
          # 3. Clean up the platform tag to prevent any Darwin leakage
          out = re.sub(r'"platform":\s*"[^"]+"', '"platform": "ios-aarch64"', out)
          
          sys.stdout.write(out)
          sys.stderr.write(result.stderr)
          sys.exit(result.returncode)
          EOF
          
          cat << EOF > fake_python
          #!/bin/bash
          python3 ${GITHUB_WORKSPACE}/fake_python.py "\$@"
          EOF
          chmod +x fake_python

      - name: Download and Extract
        run: |
          pip download loro==1.10.3 --no-binary :all:
          tar -xzf loro-1.10.3.tar.gz

      - name: Compile Loro Wheel
        run: |
          cd loro-1.10.3
          maturin build --release --target aarch64-apple-ios --out ../dist -i ${GITHUB_WORKSPACE}/fake_python

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: loro-ios-wheel
          path: dist/*.whl
